<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>soloclew-video - 激活授权</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-app-region: drag;
    user-select: none;
  }

  .card {
    background: #fff;
    border-radius: 16px;
    padding: 40px 36px 36px;
    width: 420px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
    -webkit-app-region: no-drag;
  }

  .logo {
    text-align: center;
    margin-bottom: 8px;
  }

  .logo-text {
    font-size: 28px;
    font-weight: 700;
    color: #6366f1;
    letter-spacing: -0.5px;
  }

  .subtitle {
    text-align: center;
    color: #64748b;
    font-size: 14px;
    margin-bottom: 32px;
  }

  .form-group {
    margin-bottom: 20px;
  }

  .form-label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: #374151;
    margin-bottom: 8px;
  }

  .form-input {
    width: 100%;
    padding: 12px 14px;
    font-size: 15px;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    letter-spacing: 1px;
    border: 2px solid #e2e8f0;
    border-radius: 10px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    color: #1e293b;
    background: #f8fafc;
  }

  .form-input:focus {
    border-color: #6366f1;
    box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
    background: #fff;
  }

  .form-input::placeholder {
    color: #94a3b8;
    letter-spacing: 0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }

  .btn {
    width: 100%;
    padding: 13px;
    font-size: 15px;
    font-weight: 600;
    color: #fff;
    background: #6366f1;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }

  .btn:hover {
    background: #4f46e5;
  }

  .btn:active {
    transform: scale(0.98);
  }

  .btn:disabled {
    background: #a5b4fc;
    cursor: not-allowed;
    transform: none;
  }

  .status {
    margin-top: 20px;
    padding: 12px 14px;
    border-radius: 10px;
    font-size: 13px;
    text-align: center;
    display: none;
    line-height: 1.5;
  }

  .status.loading {
    display: block;
    background: #eff6ff;
    color: #3b82f6;
    border: 1px solid #bfdbfe;
  }

  .status.success {
    display: block;
    background: #f0fdf4;
    color: #16a34a;
    border: 1px solid #bbf7d0;
  }

  .status.error {
    display: block;
    background: #fef2f2;
    color: #dc2626;
    border: 1px solid #fecaca;
  }

  .format-hint {
    font-size: 12px;
    color: #94a3b8;
    margin-top: 6px;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .spinner {
    display: inline-block;
    width: 14px;
    height: 14px;
    border: 2px solid #3b82f6;
    border-top-color: transparent;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <span class="logo-text">soloclew-video</span>
    </div>
    <p class="subtitle">请输入您的 License Key 激活软件</p>

    <div class="form-group">
      <label class="form-label" for="licenseKey">License Key</label>
      <input
        class="form-input"
        id="licenseKey"
        type="text"
        placeholder="SVC-XXXX-XXXX-XXXX-XXXXXX"
        maxlength="27"
        autocomplete="off"
        spellcheck="false"
      />
      <div class="format-hint">格式：SVC-XXXX-XXXX-XXXX-XXXXXX</div>
    </div>

    <button class="btn" id="activateBtn" disabled>激活</button>

    <div class="status" id="status"></div>
  </div>

<script>
(function() {
  const input = document.getElementById('licenseKey');
  const btn = document.getElementById('activateBtn');
  const statusEl = document.getElementById('status');

  // License Key 格式：SVC-XXXX-XXXX-XXXX-XXXXXX
  // 分隔符位置：3, 8, 13, 18
  const SEP_POSITIONS = [3, 8, 13, 18];
  const KEY_PATTERN = /^SVC-[A-Z0-9]{4}-[A-Z0-9]{4}-[A-Z0-9]{4}-[A-Z0-9]{6}$/;

  // 自动格式化输入
  input.addEventListener('input', function(e) {
    let raw = input.value.toUpperCase().replace(/[^A-Z0-9]/g, '');

    // 自动添加 SVC 前缀
    // 将纯字符重新按段落格式化
    let formatted = '';
    // 段落长度：3(SVC), 4, 4, 4, 6
    const segments = [3, 4, 4, 4, 6];
    let pos = 0;
    for (let i = 0; i < segments.length && pos < raw.length; i++) {
      if (i > 0) formatted += '-';
      formatted += raw.substring(pos, pos + segments[i]);
      pos += segments[i];
    }

    input.value = formatted;
    btn.disabled = !KEY_PATTERN.test(formatted);
  });

  // 粘贴时清理格式
  input.addEventListener('paste', function(e) {
    e.preventDefault();
    const pasted = (e.clipboardData || window.clipboardData).getData('text');
    input.value = pasted;
    input.dispatchEvent(new Event('input'));
  });

  function setStatus(type, message) {
    statusEl.className = 'status ' + type;
    if (type === 'loading') {
      statusEl.innerHTML = '<span class="spinner"></span>' + message;
    } else {
      statusEl.textContent = message;
    }
  }

  async function activate() {
    const key = input.value.trim();
    if (!KEY_PATTERN.test(key)) return;

    btn.disabled = true;
    input.disabled = true;
    setStatus('loading', '正在激活，请稍候...');

    try {
      const result = await window.licenseAPI.activate(key);
      if (result.success) {
        setStatus('success', '激活成功！窗口即将自动关闭...');
      } else {
        setStatus('error', result.message || '激活失败，请检查 License Key 是否正确');
        btn.disabled = false;
        input.disabled = false;
      }
    } catch (err) {
      setStatus('error', '激活请求失败：' + (err.message || '网络错误'));
      btn.disabled = false;
      input.disabled = false;
    }
  }

  btn.addEventListener('click', activate);

  // 回车键触发激活
  input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !btn.disabled) {
      activate();
    }
  });

  // 自动聚焦
  input.focus();
})();
</script>
</body>
</html>
